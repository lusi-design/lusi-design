<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopify Specialist</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #000;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    /* Menu Icon */
    .menu-icon {
      font-size: 26px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    /* Right side title */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .brand-icon {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
    }

    /* ===== SIDE MENU ===== */
    .side-menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #fff;
      padding: 80px 20px;
      box-shadow: 5px 0 20px rgba(0,0,0,0.1);
      transition: 0.3s ease;
      z-index: 999;
    }

    .side-menu a {
      display: block;
      margin: 20px 0;
      font-size: 18px;
      text-decoration: none;
      color: #000;
      font-weight: bold;
    }

    .side-menu.active {
      left: 0;
    }

    /* Move icon when active */
    .menu-icon.active {
      transform: translateX(200px);
    }

    /* ===== CONTENT ===== */
    .hero {
      padding: 80px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .section {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    /* ===== MOBILE ===== */
    @media (min-width: 768px) {
      .menu-icon {
        display: none;
      }

      .side-menu {
        display: none;
      }
    }

  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-icon" onclick="toggleMenu()" id="menuBtn">☰</div>

  <div class="brand">
    SHOPIFY EXPERT
    <div class="brand-icon"></div>
  </div>
</div>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">
  <a href="#">About Me</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</div>

<!-- MAIN CONTENT -->
<div class="hero">
  <h1>Your Name</h1>
  <p>Shopify Specialist & E-commerce Manager</p>
</div>

<div class="section">
  <div class="card">
    <h2>About Me</h2>
    <p>I build, customize, and optimize Shopify stores with a focus on clean UX and high conversion.</p>
  </div>

  <div class="card">
    <h2>Projects</h2>
    <p>Describe your real Shopify work here.</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
  </div>
</div>

<script>
  function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("menuBtn").classList.toggle("active");
  }
</script>

</body>
</html>
