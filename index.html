<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify Specialist</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #fff;
  color: #000;
}

/* HEADER */
.header {
  background: #95BF47;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
}

.menu-icon {
  font-size: 24px;
  cursor: pointer;
}

.logo {
  font-weight: 600;
}

/* SIDE MENU */
#menu-toggle {
  display: none;
}

.side-menu {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100%;
  background: #fff;
  padding: 20px;
  transition: 0.3s;
  box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  z-index: 999;
}

#menu-toggle:checked ~ .side-menu {
  left: 0;
}

.menu-title {
  font-weight: 600;
  margin-bottom: 20px;
}

.menu-item {
  margin: 15px 0;
  cursor: pointer;
  color: #000;
  text-decoration: none;
  display: block;
}

/* CONTENT */
.container {
  padding: 100px 20px 40px;
  max-width: 1000px;
  margin: auto;
}

/* IMAGE BLOCK */
.image-block {
  position: relative;
  margin-bottom: 40px;
  display: flex;
  justify-content: center;
}

.image-container {
  max-width: 400px;
  width: 90%;
}

.image-container img {
  width: 100%;
  height: auto;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.image-text {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: #fff;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  max-width: 80%;
  border-radius: 6px;
}

/* TITLES */
.section-title {
  color: #95BF47;
  text-align: center;
  margin: 40px 0 20px;
  font-weight: 600;
}

.line {
  height: 4px;
  background: #000;
  margin: 10px 0;
}

/* POPUPS */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.popup-content {
  background: #fff;
  padding: 30px;
  max-width: 500px;
  width: 90%;
}

.popup:target {
  display: flex;
}

/* MOBILE */
@media(max-width: 768px) {
  .image-text {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <label for="menu-toggle" class="menu-icon">&#9776;</label>
  <div class="logo">SHOPIFY EXPERT</div>
</div>

<input type="checkbox" id="menu-toggle">

<!-- SIDE MENU -->
<div class="side-menu">
  <div class="menu-title">Shopify Specialist</div>

  <a href="#main" class="menu-item">Main Page</a>
  <a href="#about-popup" class="menu-item">About Me</a>
  <a href="#services-popup" class="menu-item">Services</a>
  <a href="YOUR_SHOPIFY_LINK_HERE" class="menu-item">Hire Me</a>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="main">

  <!-- FIRST IMAGE BLOCK -->
  <div class="image-block">
    <div class="image-container">
      <img src="your-image.jpg" alt="Professional Portrait">
    </div>

    <div class="image-text">
      I help set up and manage Shopify stores with a focus on clean structure and accurate product data.
    </div>
  </div>

  <!-- ABOUT -->
  <div class="line"></div>
  <h2 class="section-title">ABOUT THE SPECIALIST</h2>
  <div class="line"></div>

  <p>
    <!-- ADD YOUR ABOUT TEXT HERE -->
  </p>

  <!-- SECOND IMAGE BLOCK -->
  <div class="image-block">
    <!-- ADD YOUR SECOND IMAGE HTML HERE -->
  </div>

  <!-- SERVICES -->
  <h2 class="section-title">SERVICES</h2>
  <p>
    <!-- ADD YOUR SERVICES TEXT HERE -->
  </p>

  <!-- HIRE -->
  <h2 class="section-title">HIRE ME ON UPWORK</h2>
  <p>
    <a href="YOUR_UPWORK_LINK_HERE">Go to my Upwork Profile</a>
  </p>

</div>

<!-- POPUPS -->
<div id="about-popup" class="popup">
  <div class="popup-content">
    <p><!-- ABOUT TEXT HERE --></p>
    <a href="#">Close</a>
  </div>
</div>

<div id="services-popup" class="popup">
  <div class="popup-content">
    <p><!-- SERVICES TEXT HERE --></p>
    <a href="#">Close</a>
  </div>
</div>

</body>
</html>
